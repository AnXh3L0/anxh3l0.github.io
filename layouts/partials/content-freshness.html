{{ $ageInHours := div (sub now.Unix .Date.Unix) 3600 }}
{{ $ageInYears := div $ageInHours 8760 }}
{{ if ge $ageInYears 2 }}
<div class="mt-4 mb-8 flex items-start gap-3 rounded-lg border border-amber-200 bg-amber-50 p-4 text-sm text-amber-800 dark:border-amber-700/50 dark:bg-amber-900/20 dark:text-amber-300" role="alert">
  <svg class="mt-0.5 h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z" />
  </svg>
  <span>{{ i18n "contentFreshness" (dict "years" $ageInYears) }}</span>
</div>
{{ end }}
