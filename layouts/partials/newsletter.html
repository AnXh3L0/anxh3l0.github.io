<form class="newsletter-form rounded-2xl border border-zinc-100 p-6 dark:border-zinc-700/40" onsubmit="return false;">
    <h2 class="flex text-sm font-semibold text-zinc-900 dark:text-zinc-100">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
        aria-hidden="true" class="h-6 w-6 flex-none">
        <path d="M2.75 7.75a3 3 0 0 1 3-3h12.5a3 3 0 0 1 3 3v8.5a3 3 0 0 1-3 3H5.75a3 3 0 0 1-3-3v-8.5Z"
          class="fill-zinc-100 stroke-zinc-400 dark:fill-zinc-100/10 dark:stroke-zinc-500"></path>
        <path d="m4 6 6.024 5.479a2.915 2.915 0 0 0 3.952 0L20 6"
          class="stroke-zinc-400 dark:stroke-zinc-500"></path>
      </svg>
      <span class="ml-3">{{ i18n "newsletterTitle" | default "Stay up to date" }}</span>
    </h2>
    <p class="mt-2 text-sm text-zinc-600 dark:text-zinc-400">
      {{ i18n "newsletterSubtitle" | default "Get notified when I publish something new, and unsubscribe at any time." }}
    </p>
    <div class="newsletter-input mt-6 flex">
      <input placeholder="{{ i18n "newsletterPlaceholder" | default "Email address" }}"
        aria-label="{{ i18n "newsletterPlaceholder" | default "Email address" }}" required
        class="min-w-0 flex-auto appearance-none rounded-md border border-zinc-900/10 bg-white px-3 py-[calc(--spacing(2)-1px)] shadow-md shadow-zinc-800/5 placeholder:text-zinc-400 focus:border-teal-500 focus:outline-hidden focus:ring-4 focus:ring-teal-500/10 dark:border-zinc-700 dark:bg-zinc-700/[0.15] dark:text-zinc-200 dark:placeholder:text-zinc-500 dark:focus:border-teal-400 dark:focus:ring-teal-400/10 sm:text-sm"
        type="email" name="email">
      <button
        class="ml-4 inline-flex flex-none items-center justify-center gap-2 rounded-md bg-zinc-800 px-3 py-2 text-sm font-semibold text-zinc-100 outline-offset-2 transition hover:bg-zinc-700 active:bg-zinc-800 active:text-zinc-100/70 active:transition-none dark:bg-zinc-700 dark:hover:bg-zinc-600 dark:active:bg-zinc-700 dark:active:text-zinc-100/70"
        type="submit">{{ i18n "newsletterJoin" | default "Join" }}</button>
    </div>
    <div class="newsletter-success mt-4 hidden rounded-md bg-teal-50 p-3 text-sm text-teal-800 dark:bg-teal-900/30 dark:text-teal-300">
      <div class="flex items-center gap-2">
        <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
        {{ i18n "newsletterThanks" | default "Thanks for subscribing! You'll hear from us soon." }}
      </div>
    </div>
</form>
<script>
(function() {
  const form = document.querySelector('.newsletter-form');
  if (!form) return;
  const input = form.querySelector('input[type="email"]');
  const inputRow = form.querySelector('.newsletter-input');
  const success = form.querySelector('.newsletter-success');
  form.querySelector('button[type="submit"]').addEventListener('click', function() {
    if (input.validity.valid && input.value) {
      inputRow.classList.add('hidden');
      success.classList.remove('hidden');
    } else {
      input.reportValidity();
    }
  });
})();
</script>
